<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>泡泡刮刮乐</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #fff;
    color: #333;
    height: 100vh; height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  header {
    display: flex; align-items: center; justify-content: center;
    gap: 16px; padding: 10px 16px;
    background: #fafafa; border-bottom: 1px solid #eee;
    flex-shrink: 0; z-index: 10;
  }
  h1 { font-size: 16px; font-weight: 600; }
  .btn {
    padding: 7px 14px; border: none; border-radius: 6px;
    font-size: 13px; cursor: pointer;
    transition: background .2s, transform .1s;
  }
  .btn:active { transform: scale(.96); }
  .btn-upload { background: #3b82f6; color: #fff; }
  .btn-upload:hover { background: #2563eb; }
  .btn-reset { background: #e5e5e5; color: #333; }
  .btn-reset:hover { background: #d5d5d5; }
  #fileInput { display: none; }
  main {
    flex: 1; display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  #wrapper {
    width: 700px; height: 350px;
    border-radius: 40px; overflow: hidden;
    box-shadow: 0 4px 24px rgba(0,0,0,.08);
    background: #f0e4d4; position: relative;
    padding: 28px 28px 28px 44px;
    display: flex; align-items: center; justify-content: flex-start;
    flex-shrink: 0;
  }
  #canvasWrap {
    border-radius: 50%; overflow: hidden;
    flex-shrink: 0;
  }
  #copyText {
    flex: 1;
    padding-left: 28px;
    font-size: 20px;
    font-weight: 600;
    color: #5a4a3a;
    line-height: 1.6;
    letter-spacing: 1px;
    opacity: 0;
    transform: translateY(12px);
    transition: opacity .6s ease, transform .6s ease;
  }
  #copyText.show {
    opacity: 1;
    transform: translateY(0);
  }
  canvas { display: block; cursor: none; }
  #cursor {
    position: absolute; pointer-events: none;
    border: 2px solid rgba(0,0,0,.15);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    display: none;
  }
  #info { display: none; }
  #uploadHint {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center; color: #555; pointer-events: none;
  }
  #uploadHint .icon { font-size: 40px; margin-bottom: 8px; }
  #rotateHint {
    display: none; position: fixed; inset: 0; z-index: 999;
    background: rgba(255,255,255,.95);
    flex-direction: column; align-items: center; justify-content: center;
    text-align: center; color: #555;
  }
  #rotateHint .icon { font-size: 48px; margin-bottom: 12px; }
  #rotateHint p { font-size: 15px; line-height: 1.6; }

  /* ── mobile landscape ── */
  @media (orientation: landscape) and (max-height: 600px) {
    header { padding: 6px 12px; gap: 10px; }
    h1 { font-size: 14px; }
    .btn { padding: 5px 10px; font-size: 12px; }
    #wrapper {
      width: 92vw; height: 82vh;
      padding: 16px 20px 16px 30px;
      border-radius: 28px;
    }
    #copyText { font-size: 16px; padding-left: 20px; }
  }

  /* ── mobile portrait → show rotate hint ── */
  @media (orientation: portrait) and (max-width: 768px) {
    #rotateHint { display: flex; }
  }

  /* ── small desktop / tablet ── */
  @media (max-width: 768px) and (orientation: landscape) {
    #wrapper {
      width: 95vw; height: 80vh;
      padding: 12px 16px 12px 24px;
      border-radius: 24px;
    }
    #copyText { font-size: 14px; padding-left: 16px; }
  }
</style>
</head>
<body>
<div id="rotateHint">
  <div class="icon">🔄</div>
  <p>请旋转手机<br>以横屏模式体验</p>
</div>
<header>
  <h1>泡泡刮刮乐</h1>
  <label class="btn btn-upload" for="fileInput">上传图片</label>
  <input type="file" id="fileInput" accept="image/*" capture="environment">
  <button class="btn btn-reset" id="resetBtn">重置</button>
</header>
<main>
  <div id="uploadHint"><div class="icon">🫧</div><p>上传图片，划过泡泡揭开</p></div>
  <div id="wrapper">
    <div id="canvasWrap">
      <canvas id="canvas"></canvas>
    </div>
    <div id="copyText"></div>
    <div id="cursor"></div>
  </div>
  <div id="info"></div>
</main>
<script>
(function () {
  "use strict";

  /* ── try lock landscape ── */
  try {
    if (screen.orientation && screen.orientation.lock) {
      screen.orientation.lock("landscape").catch(() => {});
    }
  } catch(e) {}

  const canvas  = document.getElementById("canvas");
  const ctx     = canvas.getContext("2d");
  const wrapper = document.getElementById("wrapper");
  const canvasWrap = document.getElementById("canvasWrap");
  const copyText   = document.getElementById("copyText");
  const cursor  = document.getElementById("cursor");
  const info    = document.getElementById("info");
  const hint    = document.getElementById("uploadHint");
  const fileIn  = document.getElementById("fileInput");
  const resetBtn = document.getElementById("resetBtn");

  const MIN_R  = 3;
  const FADE_MS = 300;

  let img = null, imgW = 0, imgH = 0, side = 0, imgOffX = 0, imgOffY = 0;
  let imageData = null;
  let blocks = [];
  let mouse  = { x: -999, y: -999, on: false };
  let active = false;
  let animating = false;
  let SPLIT_RADIUS = 80;
  let MAX_CANVAS = 286;

  /* ── recalc layout based on wrapper size ── */
  function recalcLayout() {
    const wr = wrapper.getBoundingClientRect();
    const pad = parseFloat(getComputedStyle(wrapper).paddingLeft) || 28;
    const copyW = copyText.offsetWidth || 0;
    const avail = Math.min(wr.height - pad * 2, wr.width - pad * 2 - copyW - 20);
    MAX_CANVAS = Math.max(120, Math.floor(avail));
    SPLIT_RADIUS = Math.max(30, Math.floor(MAX_CANVAS * 0.22));
  }

  function avgColor(x, y, w, h) {
    const sx = Math.max(0, Math.floor(x));
    const sy = Math.max(0, Math.floor(y));
    const ex = Math.min(side, Math.ceil(x + w));
    const ey = Math.min(side, Math.ceil(y + h));
    const d = imageData.data;
    let r = 0, g = 0, b = 0, n = 0;
    for (let py = sy; py < ey; py++) {
      for (let px = sx; px < ex; px++) {
        const i = (py * side + px) * 4;
        r += d[i]; g += d[i+1]; b += d[i+2];
        n++;
      }
    }
    return n ? `rgb(${(r/n)|0},${(g/n)|0},${(b/n)|0})` : "#000";
  }

  function render() {
    ctx.clearRect(0, 0, side, side);
    ctx.save();
    ctx.beginPath();
    ctx.arc(side / 2, side / 2, side / 2, 0, Math.PI * 2);
    ctx.clip();
    ctx.drawImage(img, imgOffX, imgOffY, imgW, imgH);
    ctx.restore();
    for (const b of blocks) {
      if (b.a <= 0) continue;
      const cx = b.x + b.w / 2;
      const cy = b.y + b.h / 2;
      const r  = Math.min(b.w, b.h) / 2;
      ctx.globalAlpha = b.a;
      ctx.fillStyle   = b.color;
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  function updateInfo() { /* hidden */ }

  /* ── image load ── */
  fileIn.addEventListener("change", e => {
    const f = e.target.files[0];
    if (!f) return;
    blocks = [];
    animating = false;
    active = false;
    copyText.classList.remove("show");
    const reader = new FileReader();
    reader.onload = ev => {
      img = new Image();
      img.onload = () => initGame();
      img.src = ev.target.result;
    };
    reader.readAsDataURL(f);
    fileIn.value = "";
  });

  function initGame() {
    hint.style.display = "none";
    recalcLayout();
    const maxDim = Math.max(img.naturalWidth, img.naturalHeight);
    const s = Math.min(MAX_CANVAS / maxDim, 1);
    imgW = Math.round(img.naturalWidth * s);
    imgH = Math.round(img.naturalHeight * s);
    side = Math.max(imgW, imgH);
    imgOffX = (side - imgW) / 2;
    imgOffY = (side - imgH) / 2;

    canvas.width  = side;
    canvas.height = side;
    canvasWrap.style.width  = side + "px";
    canvasWrap.style.height = side + "px";

    const tmpCanvas = document.createElement("canvas");
    tmpCanvas.width = side; tmpCanvas.height = side;
    const tmpCtx = tmpCanvas.getContext("2d");
    tmpCtx.drawImage(img, imgOffX, imgOffY, imgW, imgH);
    imageData = tmpCtx.getImageData(0, 0, side, side);

    resetBlocks();
    active = true;
    cursor.style.width = cursor.style.height = SPLIT_RADIUS * 2 + "px";

    copyText.textContent = copies[Math.floor(Math.random() * copies.length)];
    setTimeout(() => copyText.classList.add("show"), 200);
  }

  function resetBlocks() {
    blocks = [{ x: 0, y: 0, w: side, h: side, color: "#000", a: 1 }];
    animating = false;
    render();
  }

  resetBtn.addEventListener("click", () => {
    if (!img) return;
    resetBlocks();
    copyText.classList.remove("show");
    setTimeout(() => {
      copyText.textContent = copies[Math.floor(Math.random() * copies.length)];
      copyText.classList.add("show");
    }, 200);
  });

  /* ── split near pointer ── */
  function splitNearCursor() {
    if (!mouse.on || animating || !active) return;
    const next = [];
    let didSplit = false;
    for (const b of blocks) {
      if (b.a <= 0) { next.push(b); continue; }
      const bCx = b.x + b.w / 2;
      const bCy = b.y + b.h / 2;
      const bR  = Math.min(b.w, b.h) / 2;
      const dist = Math.hypot(mouse.x - bCx, mouse.y - bCy);
      if (dist < bR + SPLIT_RADIUS && bR > MIN_R * 2) {
        const hw = b.w / 2, hh = b.h / 2;
        for (let dr = 0; dr < 2; dr++) {
          for (let dc = 0; dc < 2; dc++) {
            const nx = b.x + dc * hw;
            const ny = b.y + dr * hh;
            next.push({ x: nx, y: ny, w: hw, h: hh, color: avgColor(nx, ny, hw, hh), a: 1 });
          }
        }
        didSplit = true;
      } else { next.push(b); }
    }
    blocks = next;
    let fadeCount = 0;
    for (const b of blocks) {
      if (b.a > 0 && Math.min(b.w, b.h) / 2 < MIN_R) { b._fade = true; fadeCount++; }
    }
    if (fadeCount > 0 && !animating) {
      animating = true;
      const t0 = performance.now();
      (function tick(now) {
        const t = Math.min((now - t0) / FADE_MS, 1);
        for (const b of blocks) if (b._fade) b.a = 1 - t;
        render();
        if (t < 1) return requestAnimationFrame(tick);
        blocks = blocks.filter(b => !(b._fade && b.a <= 0));
        animating = false;
      })(t0);
    } else if (didSplit) { render(); }
  }

  /* ── pointer position helper ── */
  function setPointer(clientX, clientY) {
    const r = canvas.getBoundingClientRect();
    mouse.x = (clientX - r.left) * (canvas.width / r.width);
    mouse.y = (clientY - r.top)  * (canvas.height / r.height);
    const wr = wrapper.getBoundingClientRect();
    cursor.style.left = (clientX - wr.left) + "px";
    cursor.style.top  = (clientY - wr.top)  + "px";
  }

  /* ── mouse events ── */
  canvasWrap.addEventListener("mouseenter", () => { mouse.on = true; cursor.style.display = "block"; });
  canvasWrap.addEventListener("mouseleave", () => { mouse.on = false; cursor.style.display = "none"; });
  canvasWrap.addEventListener("mousemove", e => { setPointer(e.clientX, e.clientY); });

  /* ── touch events ── */
  canvasWrap.addEventListener("touchstart", e => {
    e.preventDefault();
    mouse.on = true;
    cursor.style.display = "block";
    const t = e.touches[0];
    setPointer(t.clientX, t.clientY);
  }, { passive: false });

  canvasWrap.addEventListener("touchmove", e => {
    e.preventDefault();
    const t = e.touches[0];
    setPointer(t.clientX, t.clientY);
  }, { passive: false });

  canvasWrap.addEventListener("touchend", () => {
    mouse.on = false;
    cursor.style.display = "none";
  });

  /* ── random copy text ── */
  const copies = [
    "用泡泡\n揭开一个秘密",
    "每一颗泡泡\n都藏着色彩",
    "慢慢划\n别着急",
    "泡泡碎了\n画面就来了",
    "你划开的\n不只是泡泡",
    "手指所到\n泡泡开花",
    "秘密藏在\n泡泡背后",
    "一点一点\n揭开真相",
    "泡泡说\n我挡不住你",
    "划开迷雾\n看见美好",
    "泡泡虽小\n画面很大",
    "每一次触碰\n都是一次揭秘",
    "耐心划完\n会有惊喜",
    "泡泡碎碎\n画面成成",
    "你的好奇心\n正在被奖励",
  ];
  copyText.textContent = copies[Math.floor(Math.random() * copies.length)];

  /* ── continuous split loop ── */
  setInterval(() => { if (mouse.on && active) splitNearCursor(); }, 30);

  /* ── orientation change → recalc ── */
  window.addEventListener("orientationchange", () => {
    setTimeout(() => { if (img && active) { recalcLayout(); initGame(); } }, 300);
  });
  window.addEventListener("resize", () => {
    if (img && active) { recalcLayout(); initGame(); }
  });
})();
</script>
</body>
</html>
